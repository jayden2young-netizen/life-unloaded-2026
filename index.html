<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0b0c0e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="人生尚未加载" />
  <link rel="icon" href="data:," />
  <title>人生尚未加载 · 2026 · v0.5.10</title>
    <link rel="stylesheet" href="./style.css?v=0.5.10" />

</head>
<body>
<div id="app">
  <main class="boot-fallback" aria-live="polite">
    <div>
        <div class="boot-label">人生尚未加载 · 2026 · v0.5.10</div>
      <h1>当前预览器没有运行游戏脚本</h1>
      <p>这不是游戏画面。ChatGPT／iOS 的附件预览可能只显示 HTML 样式，不执行其中的 JavaScript，因此会出现黑屏。</p>
    </div>
    <div>
      <div class="boot-card">
        <div class="boot-label">正确打开方式</div>
        <p>游戏需要通过一个网页地址在 Safari 中打开。单纯在附件预览或“文件”快速查看中打开，无法可靠运行本地 HTML 游戏。</p>
      </div>
      <p class="boot-foot" style="margin-top:18px">脚本正常运行时，这个提示会自动消失并进入游戏首页。</p>
    </div>
  </main>
</div>
<noscript>此游戏需要 JavaScript。</noscript>
<script>
window.__LIFE_BOOTED__ = false;
window.addEventListener('error', function (event) {
  if (window.__LIFE_BOOTED__) return;
  var app = document.getElementById('app');
  if (!app) return;
  var message = event && event.message ? event.message : '未知启动错误';
  var safe = String(message).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});
  app.innerHTML = '<main class="boot-fallback"><div><div class="boot-label">启动失败</div><h1>游戏脚本发生错误</h1><p>错误：' + safe + '</p></div><div class="boot-card"><p>请保留这段错误信息用于修复。页面不会再以纯黑屏结束。</p></div></main>';
});
window.addEventListener('unhandledrejection', function (event) {
  if (window.__LIFE_BOOTED__) return;
  var app = document.getElementById('app');
  if (!app) return;
  var reason = event && event.reason;
  var message = reason && reason.message ? reason.message : String(reason || '未知异步启动错误');
  var safe = String(message).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});
  app.innerHTML = '<main class="boot-fallback"><div><div class="boot-label">启动失败</div><h1>游戏数据没有加载成功</h1><p>错误：' + safe + '</p></div><div class="boot-card"><p>请确认 index.html、style.css、game.js、data.json 位于仓库同一层，并等待 GitHub Pages 完成更新。</p></div></main>';
});

</script>
<script src="./game.js?v=0.5.10"></script>
</body>
</html>
